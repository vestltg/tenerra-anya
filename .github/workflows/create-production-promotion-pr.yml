name: Create production promotion PR

on:
  workflow_dispatch:
    inputs:
      title:
        description: PR title
        required: false
        default: Promote development to main
        type: string
      body:
        description: PR description
        required: false
        default: Promote the current development branch to main for production deployment.
        type: string
      draft:
        description: Create as a draft PR
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse promotion PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = `${owner}:development`;

            const existingPullRequests = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              head,
              per_page: 100,
            });

            if (existingPullRequests.length > 0) {
              const existing = existingPullRequests[0];
              core.notice(`Existing PR already open: ${existing.html_url}`);
              core.setOutput('pull_request_url', existing.html_url);
              core.setOutput('pull_request_number', String(existing.number));
              return;
            }

            const response = await github.rest.pulls.create({
              owner,
              repo,
              title: context.payload.inputs?.title || 'Promote development to main',
              head: 'development',
              base: 'main',
              body: context.payload.inputs?.body || 'Promote the current development branch to main for production deployment.',
              draft: context.payload.inputs?.draft === 'true',
            });

            core.notice(`Created PR: ${response.data.html_url}`);
            core.setOutput('pull_request_url', response.data.html_url);
            core.setOutput('pull_request_number', String(response.data.number));