<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-labelledby="t4 d4" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="t4">Anya — Conversations</title>
  <desc id="d4">A parent asks Anya what a new caregiver should know about their child's first day. Anya replies with specific personal detail about Terrance and cites the document and Pocket it drew from.</desc>
  <rect x="0.5" y="0.5" width="599" height="319" rx="14" fill="#FAF9FB" stroke="#E4E0EB"/>
  <rect x="0" y="0" width="600" height="44" rx="14" fill="#FFFFFF"/>
  <path d="M0 44 H600" stroke="#E4E0EB"/>
  <rect x="16" y="13" width="18" height="18" rx="5" fill="#8256F7"/>
  <text x="25" y="26" fill="#FFFFFF" font-size="11" font-weight="600" text-anchor="middle">A</text>
  <text x="44" y="27" fill="#2C2442" font-size="14" font-weight="500">Conversations</text>

  <rect x="244" y="60" width="340" height="58" rx="14" fill="#8256F7"/>
  <text x="266" y="84" fill="#FFFFFF" font-size="13.5">What should a new caregiver know about my</text>
  <text x="266" y="104" fill="#FFFFFF" font-size="13.5">child's first day?</text>

  <circle cx="30" cy="150" r="14" fill="#EFEDFE"/>
  <text x="30" y="154" fill="#8256F7" font-size="13" font-weight="600" text-anchor="middle">A</text>
  <rect x="52" y="134" width="500" height="172" rx="14" fill="#FFFFFF" stroke="#E4E0EB"/>
  <text x="68" y="160" fill="#2C2442" font-size="13.5">On a first day, expect Terrance to gravitate to the kitchen — he likes</text>
  <text x="68" y="179" fill="#2C2442" font-size="13.5">being near whoever's cooking, and that's where he settles in. He'll</text>
  <text x="68" y="198" fill="#2C2442" font-size="13.5">talk a lot and may ask questions he already knows the answers to —</text>
  <text x="68" y="217" fill="#2C2442" font-size="13.5">that's how he keeps a conversation going, not confusion. When he</text>
  <text x="68" y="236" fill="#2C2442" font-size="13.5">goes quiet and reaches for his headphones, he isn't upset — he's</text>
  <text x="68" y="255" fill="#2C2442" font-size="13.5">recharging.</text>

  <rect x="68" y="272" width="170" height="22" rx="6" fill="#F1EFF8"/>
  <rect x="79" y="279" width="9" height="11" rx="1.5" fill="none" stroke="#6B6284" stroke-width="1.1"/>
  <text x="96" y="287" fill="#6B6284" font-size="11">Terrance_IEP_2026.pdf</text>
  <rect x="248" y="272" width="196" height="22" rx="6" fill="#F1EFF8"/>
  <circle cx="261" cy="282" r="3" fill="none" stroke="#6B6284" stroke-width="1.1"/>
  <path d="M256 290 q5 -5 10 0" fill="none" stroke="#6B6284" stroke-width="1.1" stroke-linecap="round"/>
  <text x="272" y="287" fill="#6B6284" font-size="11">About Me · My Personality</text>
</svg>
