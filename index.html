<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anya — Coming Soon</title>
  <meta name="description" content="Anya by Tenerra is coming soon." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://anya.tenerra.ai/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Anya — Coming Soon" />
  <meta property="og:description" content="Anya by Tenerra is coming soon." />
  <meta property="og:url" content="https://anya.tenerra.ai/" />
  <meta property="og:type" content="website" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --accent: #a78bfa;
      --accent-dim: rgba(167, 139, 250, 0.1);
      --accent-glow: rgba(167, 139, 250, 0.07);
      --text: #ede9fe;
      --muted: #6b6a8a;
      --border: rgba(167, 139, 250, 0.15);
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }

    /* Star-field dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(167,139,250,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 8%,  rgba(167,139,250,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 65%, rgba(167,139,250,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 55%, rgba(167,139,250,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  80%, rgba(167,139,250,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(167,139,250,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 42%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 30%, rgba(255,255,255,0.12) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Central radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      animation: fadeUp 1s ease both;
    }

    /* Soft ring around the name */
    .ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--accent-dim);
      margin-bottom: 2rem;
      position: relative;
    }

    .ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(167, 139, 250, 0.07);
    }

    .sub {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 1.25rem;
      opacity: 0.5;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1.1rem;
      border: 1px solid var(--border);
      background: var(--accent-dim);
      color: var(--accent);
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ring">
      <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Anya logo" role="img">
        <!-- Purple crescent arc (C-shape opening to the right) -->
        <path fill="#6B63E8" d="M 69 10 A 44 44 0 1 0 69 90 L 62 75 A 28 28 0 1 1 62 25 Z"/>
        <!-- Plant stem -->
        <path fill="none" stroke="#5ABD2A" stroke-width="2.2" stroke-linecap="round"
              d="M 64 84 C 64 70 63 55 62 32"/>
        <!-- Left leaf -->
        <path fill="#5ABD2A" d="M 63 62 C 57 57 45 49 48 41 C 53 46 59 55 63 62 Z"/>
        <!-- Left leaf vein -->
        <line x1="63" y1="62" x2="49" y2="43" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
        <!-- Right leaf -->
        <path fill="#5ABD2A" d="M 64 56 C 69 49 79 45 78 37 C 73 43 67 51 64 56 Z"/>
        <!-- Right leaf vein -->
        <line x1="64" y1="56" x2="77" y2="39" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
        <!-- Top center leaf -->
        <path fill="#5ABD2A" d="M 62 32 C 54 27 53 15 62 9 C 71 15 70 27 62 32 Z"/>
        <!-- Top leaf vein -->
        <line x1="62" y1="32" x2="62" y2="11" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
      </svg>
    </div>
    <p class="sub">by Tenerra</p>
    <div class="divider"></div>
    <p class="tagline">Something intelligent is on its way.</p>
    <div class="badge">Coming Soon</div>
  </div>
</body>
</html>
