<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anya — Coming Soon</title>
  <meta name="description" content="Anya by Tenerra is coming soon." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://anya.tenerra.ai/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Anya — Coming Soon" />
  <meta property="og:description" content="Anya by Tenerra is coming soon." />
  <meta property="og:url" content="https://anya.tenerra.ai/" />
  <meta property="og:type" content="website" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --accent: #a78bfa;
      --accent-dim: rgba(167, 139, 250, 0.1);
      --accent-glow: rgba(167, 139, 250, 0.07);
      --text: #ede9fe;
      --muted: #6b6a8a;
      --border: rgba(167, 139, 250, 0.15);
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }

    /* Star-field dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(167,139,250,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 8%,  rgba(167,139,250,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 65%, rgba(167,139,250,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 55%, rgba(167,139,250,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  80%, rgba(167,139,250,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(167,139,250,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 42%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 30%, rgba(255,255,255,0.12) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Central radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      animation: fadeUp 1s ease both;
    }

    /* Soft ring around the name */
    .ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--accent-dim);
      margin-bottom: 2rem;
      position: relative;
    }

    .ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(167, 139, 250, 0.07);
    }

    .logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      display: block;
    }

    .sub {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 1.25rem;
      opacity: 0.5;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1.1rem;
      border: 1px solid var(--border);
      background: var(--accent-dim);
      color: var(--accent);
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ring">
      <img class="logo" src="assets/images/Anya_ICON_transparent.png" alt="Anya logo" />
    </div>
    <p class="sub">by Tenerra</p>
    <div class="divider"></div>
    <p class="tagline">Something intelligent is on its way.</p>
    <div class="badge">Coming Soon</div>
  </div>
</body>
</html>
